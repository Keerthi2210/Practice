<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body bgcolor="beige" style="font-family: Times New Roman;">
    <form position="absolute">
        <fieldset >
            <legend style="color: #000; text-align: center; font-size: 24px; font-weight: bold;">
                    <h1>Student Registration Form</h1>
            </legend>   
                    <label for="name">Student Full Name:</label>
                    <input type="text" placeholder="Enter your full name" id="name" name="name" required>
                    <br><br>
                    <label for="email" >Email Address:</label>
                    <input type="email" placeholder="Enter your email" id="email" name="email" required>
                    <br><br>
                    <label for="phone">Phone Number:</label>
                    <input type="tel" placeholder="Enter your phone number" id="phone" name="phone" required>
                    <br><br>
                    <label for="dob">Date of Birth:</label>
                    <input type="date" placeholder="Enter your date of birth" id="dob" name="dob" required>
                    <br><br>
                    <label for="gender">Gender:</label>
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                    <input type="radio" id="other" name="gender" value="other" required>
                    <label for="other">Other</label>
                    <br><br>
                    <label for="course">Select Course:</label>
                    <select name="course" id="course" required>
                        <option value="B.Tech">B.Tech</option>
                        <option value="B.Sc">B.Sc</option>
                        <option value="BCA">BCA</option>
                        <option value="MCA">MCA</option>
                        <option value="MBA">MBA</option>
                    </select>
                    <br><br>
                    <label for="skill">Skills:</label><br>
                    <input type="checkbox" id="html" name="skill" value="HTML">
                    <label for="html">HTML</label><br>
                    <input type="checkbox" id="css" name="skill" value="CSS">
                    <label for="css">CSS</label><br>
                    <input type="checkbox" id="js" name="skill" value="JavaScript">
                    <label for="js">JavaScript</label><br>
                    <input type="checkbox" id="Python" name="skill" value="Python">
                    <label for="Python">Python</label><br>
                    <input type="checkbox" name="Java" id="java" value="Java">
                    <label for="java">Java</label><br>
                    <br><br>
                    <label for="address">Address:</label><br>
                    <textarea placeholder="Enter your address" name="address" rows="4" cols="50" required></textarea>
                    <br><br>
                    <label for="photo">Upload your Photo:</label>
                    <input type="file" id = "photo" name="photo" required>
                    <br><br>
                    <label for="pwd">Enter Password:</label>
                    <input type="password" placeholder="Enter your password" id="pwd" name="pwd" required>
                    <br><br>
                    <label for="confirm">Confirm Password:</label>
                    <input type="password" placeholder="Confirm your password" id="confirm" name="confirm" required>
                    <br><br>
                    <input type="submit" value="Register">
                   <input type="reset" value="Reset">
        </fieldset>        
    </form>    
</body>
</html>
