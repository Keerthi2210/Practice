<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML From</title>
</head>
<body style="background-color: blueviolet;color: white;">
    <form>
        <label for="fname">First Name</label>
        <input type="text" id ="fname" maxlength="30" pattern="[A-Za-z]+"><br>
        <br><br>
        <label for="lanme">Last Name</label>
        <input type="text" id ="lname" maxlength="30" pattern="[A-za-z]+"><br>
        <br><br>
        <label for="dob">Date Of Birth</label><br>
        <label for="day">Day:</label>
        <select name="day" id="day">
            <option value="Monday">Monday</option>
            <option value="Tuesday">Tuesday</option>
            <option value="Wednesday">Wednesday</option>
            <option value="Thursday">Thursday</option>
            <option value="Friday">Friday</option>
            <option value="Saturday">Saturday</option>
        </select>
        <label for="month">Month:</label>
        <select name="month" id="month">
            <option value="January">January</option>
            <option value="February">February</option>
            <option value="March">March</option>
            <option value="April">April</option>
            <option value="May">May</option>
            <option value="June">June</option>
            <option value="July">July</option>
            <option value="August">August</option>
            <option value="September">September</option>
            <option value="October">October</option>
            <option value="November">November</option>
            <option value="December">December</option>  
        </select>
        <label for="year">Year:</label>
        <select name="year" id="year">
            <option value="1990">1990</option>
            <option value="1991">1991</option>
            <option value="1992">1992</option>
            <option value="1993">1993</option>
            <option value="1994">1994</option>
            <option value="1995">1995</option>
            <option value="1996">1996</option>
            <option value="1997">1997</option>
            <option value="1998">1998</option>
            <option value="1999">1999</option>
            <option value="2000">2000</option>  
        </select>
        <br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" required><br><br>
        <label for="phoneno">Phone Number:</label>
        <input type="tel" id="phoneno" name="phoneno" pattern="[0-9]{10}" maxlength="10">
        <br><br>
        <label for="gender">Gender:</label>
        <input type="radio" id="gender" name="gender" value="male">Male
        <input type="radio" id="gender" name="gender" value="female">Female
        <br><br>
        <label for="address">Address:</label>
        <textarea id="address" name="address" rows="4" cols="50"></textarea><br><br>
        <label for="city">City:</label>
        <input type="text" id="city" name="city" maxlength="30">
        <br><br>
        <label for="picode">PIN Code:</label>
        <input type="text" id="picode" name="picode" maxlength="6">
        <br><br>
        <label for="state">STATE:</label>
        <input type="text" id="state" name="state" maxlength="30" pattern="[A-Za-z]+">
        <br><br>
        <label for="country">Country:</label>
        <input type="text" id="country" name="country" maxlength="30">
        <br><br>
        <label for="hobbies">Hobbies:</label><br>
        <input type="checkbox" id="hobby1" name="hobbies" value="drawing">Drawing
        <input type="checkbox" id="hobby2" name="hobbies" value="dancing">Dancing
        <input type="checkbox" id="hobby3" name="hobbies" value="sketching">Sketching<br>
        <input type="checkbox" id="hobby4" name="hobbies" value="others">Others
        <input type="text"><br>
        <br><br>
        Qualification:<br>
        <table>
            <tr>
                <th>SI.NO.Examination</th>
                <th>Board</th>
                <th>Percentage</th>
                <th>Year of Passing</th>
            </tr>
            <tr>
                <td>Class X</td>
                <td><input type="text" name="qualification1"></td>
                <td><input type="text" name="year1"></td>
                <td><input type="text" name="percentage1"></td>
            </tr>
            <tr>
                <td>Class XII</td>
                <td><input type="text" name="qualification2"></td>
                <td><input type="text" name="year2"></td>
                <td><input type="text" name="percentage2"></td>
            </tr>
            <tr>
                <td>Graduation</td>
                <td><input type="text" name="qualification3"></td>
                <td><input type="text" name="year3"></td>
                <td><input type="text" name="percentage3"></td>
            </tr>
             <tr>
                <td>Post Graduation</td>
                <td><input type="text" name="qualification4"></td>
                <td><input type="text" name="year4"></td>
                <td><input type="text" name="percentage4"></td>
        </table>
        <br><br>
        <label for="course">Courses Applied For:</label>
        <input type="radio" id="course1" name="course" value="BCA">BCA
        <input type="radio" id="course2" name="course" value="B.Com">B.Com
        <input type="radio" id="course3" name="course" value="B.Sc">B.Sc
        <input type="radio" id="course4" name="course" value="B.A">B.A
        <br><br>
        <center><input type="submit" value="Submit">
        <input type="reset" value="Reset"></center>
    </form>
</body>
</html>
